<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoidSound Finanzas - Eliminar Suscripción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>Eliminar Suscripción</h1>
    <hr>
    <div class="alert alert-danger" role="alert" style="max-width: 35rem;">
        <h4 class="alert-heading">¿Estás seguro de que deseas eliminar esto?</h4>
        <p>Esta acción no se puede deshacer. Se eliminará el registro de suscripción del usuario <strong>{{ object.usuario.nombre }}</strong>.</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirmar Eliminación</button>
            <a href="{% url 'suscripcion_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
