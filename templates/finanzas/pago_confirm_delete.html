<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoidSound Finanzas - Eliminar Registro de Pago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>Eliminar Registro de Pago</h1>
    <hr>
    <div class="alert alert-danger" role="alert" style="max-width: 35rem;">
        <h4 class="alert-heading">¿Proceder con la eliminación física del registro?</h4>
        <p>Vas a eliminar el comprobante del pago número <strong>#{{ object.id_pago }}</strong> por un valor de <strong>${{ object.monto }}</strong>.</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirmar Eliminación</button>
            <a href="{% url 'pago_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
