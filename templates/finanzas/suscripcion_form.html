{% extends 'base/base.html' %}

{% block title %}VoidSound Finanzas - Guardar Suscripción{% endblock title %}

{% block content %}
<div class="page-header">
    <h1>{% if object %}Editar{% else %}Nueva{% endif %} Suscripción</h1>
</div>

<div class="card-spotify" style="max-width: 600px;">
    <form method="post" style="display: flex; flex-direction: column; gap: 20px;">
        {% csrf_token %}
        
        <div style="display: flex; flex-direction: column; gap: 15px;">
            {{ form.as_p }}
        </div>
        
        <div style="margin-top: 10px; display: flex; gap: 15px;">
            <button type="submit" class="btn-spotify-primary">Guardar Cambios</button>
            <a href="{% url 'suscripcion_list' %}" class="btn-spotify-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock content %}
