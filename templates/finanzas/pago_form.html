<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoidSound Finanzas - Formulario de Pago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>{% if object %}Modificar Transacción{% else %}Registrar Nuevo Pago{% endif %}</h1>
    <hr>
    <div class="row">
        <div class="col-md-6 shadow p-4 rounded bg-light">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Procesar Transacción</button>
                    <a href="{% url 'pago_list' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
