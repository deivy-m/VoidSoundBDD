{% extends 'base/base.html' %}

{% block title %}VoidSound - Guardar Canción{% endblock title %}

{% block content %}
<div class="page-header">
    <h1>Configurar Canción</h1>
</div>

<div class="card-spotify">
    <form method="post" style="display: flex; flex-direction: column; gap: 20px;">
        {% csrf_token %}
        
        <div style="display: flex; flex-direction: column; gap: 15px;">
            {{ form.as_p }}
        </div>
        
        <div style="margin-top: 10px; display: flex; gap: 15px;">
            <button type="submit" class="btn-spotify-primary">Guardar Canción</button>
            <a href="{% url 'cancion_list' %}" class="btn-spotify-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock content %}
