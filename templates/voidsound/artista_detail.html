{% extends 'base/base.html' %}

{% block title %}VoidSound - {{ artista.nombreArtista }}{% endblock title %}

{% block content %}
<div class="page-header">
    <h1>Perfil de Artista</h1>
    <a href="{% url 'artista_list' %}" class="btn-spotify-secondary">Volver al catálogo</a>
</div>

<div class="card-spotify" style="display: flex; flex-direction: column; gap: 15px;">
    <h2 style="color: var(--spotify-celeste); font-size: 1.8rem;">{{ artista.nombreArtista }}</h2>
    <p style="font-size: 1.1rem;"><strong>País de Origen:</strong> <span style="color: var(--text-gray);">{{ artista.paisArtista }}</span></p>
    
    <div style="margin-top: 15px; display: flex; gap: 15px;">
        <a href="{% url 'artista_update' artista.pk %}" class="btn-spotify-primary" style="background-color: #ffc107; color: #000;">Editar Información</a>
    </div>
</div>
{% endblock content %}
