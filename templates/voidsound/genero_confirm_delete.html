<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoidSound - Quitar Género</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="alert alert-danger p-4 shadow-sm" role="alert">
        <h4 class="alert-heading">⚠️ ¿Eliminar el género musical?</h4>
        <p>Vas a eliminar el género <strong>"{{ object.nombreGenero }}"</strong>. Si existen canciones indexadas bajo este género, el motor de la base de datos protegerá la integridad relacional impidiendo el borrado.</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Eliminar de forma permanente</button>
            <a href="{% url 'genero_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
