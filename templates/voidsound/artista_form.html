<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoidSound - Guardar Artista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>{% if filter_update %}Editar{% else %}Registrar Nuevo{% endif %} Artista</h1>
    <hr>

    <div class="card p-4 shadow-sm bg-light">
        <form method="post">
            {% csrf_token %} <div class="mb-3">
                {{ form.as_p }} </div>

            <button type="submit" class="btn btn-success">Guardar Cambios</button>
            <a href="{% url 'artista_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
