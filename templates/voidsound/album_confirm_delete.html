<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoidSound - Eliminar Álbum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="alert alert-danger p-4 shadow-sm" role="alert">
        <h4 class="alert-heading">⚠️ ¿Deseas eliminar este álbum?</h4>
        <p>Eliminarás el álbum <strong>"{{ object.nombreAlbum }}"</strong>. Ten en cuenta que si existen canciones vinculadas a este álbum, el sistema podría denegar la acción por integridad relacional.</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Eliminar permanentemente</button>
            <a href="{% url 'album_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
