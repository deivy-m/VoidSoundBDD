<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoidSound - Detalles de Álbum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>Detalles del Álbum</h1>
    <hr>
    <div class="card shadow-sm" style="width: 26rem;">
        <div class="card-body">
            <h5 class="card-title text-success">{{ object.nombreAlbum }}</h5>
            <h6 class="card-subtitle mb-2 text-muted">ID Álbum: {{ object.id_album }}</h6>
            <p class="card-text"><strong>Fecha Lanzamiento:</strong> {{ object.fecha_lanzamiento }}</p>
            <p class="card-text"><strong>Artista:</strong> {{ object.artista.nombreArtista|default:"N/A" }}</p>
            
            <div class="mt-4">
                <a href="{% url 'album_update' object.pk %}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{% url 'album_list' %}" class="btn btn-secondary btn-sm">Regresar</a>
            </div>
        </div>
    </div>
</body>
</html>
