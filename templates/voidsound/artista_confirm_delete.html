<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VoidSound - Confirmar Eliminación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="alert alert-danger shadow-sm p-4" role="alert">
        <h4 class="alert-heading">⚠️ ¿Estás absolutamente seguro?</h4>
        <p>Estás a punto de eliminar al artista <strong>"{{ object.nombreArtista }}"</strong> del ecosistema VoidSound. Esta acción no se puede deshacer.</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, Eliminar de forma permanente</button>
            <a href="{% url 'artista_list' %}" class="btn btn-secondary">Cancelar y volver</a>
        </form>
    </div>
</body>
</html>
