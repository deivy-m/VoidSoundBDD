<!DOCTYPE html>
<html lang="es">
<head>
    <title>Iniciar Sesión</title>
</head>
<body>
    <h2>Iniciar Sesión en VoidSound</h2>

    <form method="POST">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div style="color: red;">
                {% for error in form.non_field_errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            </div>
        {% endif %}

        {{ form.as_p }}

        <button type="submit">Ingresar</button>
    </form>
</body>
</html>
