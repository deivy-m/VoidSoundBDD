<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil - VoidSound</title>
</head>
<body>
    <h1>Editar Datos de Perfil</h1>

    <form method="POST">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div style="color: red;">
                {% for error in form.non_field_errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            </div>
        {% endif %}

        {{ form.as_p }}

        <button type="submit">Guardar Cambios</button>
    </form>

    <br>
    <hr>
    <p>
        <a href="{% url 'profile' %}">Cancelar y Volver al Perfil</a>
    </p>
</body>
</html>
